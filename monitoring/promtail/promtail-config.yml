server:
    http_listen_port: 9080
    grpc_listen_port: 0

positions:
    filename: /tmp/positions.yaml

clients:
    - url: http://loki:3100/loki/api/v1/push

scrape_configs:
    - job_name: signal-lab-backend-file
      static_configs:
          - targets:
                - localhost
            labels:
                job: signal-lab-backend
                app: signal-lab
                __path__: /var/log/signal-lab/backend.log
      pipeline_stages:
          - json:
                expressions:
                    level: level
                    message: message
                    scenarioType: scenarioType
                    scenarioId: scenarioId
                    duration: duration
                    error: error
          - labels:
                level:
                scenarioType:
